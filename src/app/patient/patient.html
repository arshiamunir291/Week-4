<div class="container-fluid d-flex flex-column mt-2 align-items-center">
    <h1 class="fs-2 mb-3 fw-bold text-white   ">Smart Care Portal</h1>
    <div class="card shadow-sm pt-2 pb-2">
        <div class="card-body">
            <h2 class="card-title text-center mb-1 ">Register patient</h2>
            <form [formGroup]="patientForm" (ngSubmit)="onsubmit()">
                <div class="mb-1">
                    <label for="fullname" class="form-label fw-bold">Full Name</label>
                    <input type="text" id="fullname" class="form-control" formControlName="fullname" placeholder="Enter full name" appFormError [messages]="validationMessage.fullname">
                </div>
                <div class="mb-1">
                    <label for="email" class="form-label fw-bold">Email</label>
                    <input type="email" id="email" class="form-control" formControlName="email" placeholder="Enter email" appFormError [messages]="validationMessage.email">
                </div>
                <div class="mb-1">
                    <label for="cnic" class="form-label fw-bold">CNIC</label>
                    <input type="text" id="cnic" class="form-control" formControlName="cnic" placeholder="Enter cnic" appFormError [messages]="validationMessage.cnic">
                </div>
                <div class="mb-1">
                    <label for="age" class="form-label fw-bold">Age</label>
                    <input type="number" id="age" class="form-control" formControlName="age" placeholder="Enter age" appFormError [messages]="validationMessage.age">
                </div>
                <div class="mb-1">
                    <label for="gender" class="form-label fw-bold">Gender</label>
                    <input type="text" id="gender" class="form-control" formControlName="gender" placeholder="Enter gender" appFormError [messages]="validationMessage.gender">
                </div>
                <div class="mb-1">
                    <label for="phone" class="form-label fw-bold">Phone</label>
                    <input type="text" id="phone" class="form-control" formControlName="phone" placeholder="Enter phone number" appFormError [messages]="validationMessage.phone">
                </div>
                <div class="mb-1">
                    <label for="disease" class="form-label fw-bold">Disease</label>
                    <input type="text" id="disease" class="form-control" formControlName="disease" placeholder="Enter disease" appFormError [messages]="validationMessage.disease">
                </div>
                <div class="mb-1 d-flex justify-content-start">
                    <button type="submit" class="btn btn-success fw-bold text-white mt-2 px-5"
                        [disabled]="patientForm.invalid">Submit</button>
                    <button type="reset" class="btn btn-primary fw-bold text-white mx-3 px-5 mt-2"
                        (click)="resetForm()">Reset</button>
                    <a routerLink="/dashboard" class="btn btn-secondary btn-lg px-5 mt-2 mx-1">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
